run:
  timeout: 5m
  tests: false

linters-settings:
  lll:
    # max line length, lines longer will be reported. Default is 120.
    # '\t' is counted as 1 character by default, and can be changed with the tab-width option
    line-length: 140
    # tab width in spaces. Default to 1.
    tab-width: 4

  interfacebloat:
    # The maximum number of methods allowed for an interface.
    # Default: 10
    max: 25

  cyclop:
    # The maximal code complexity to report.
    # Default: 10
    max-complexity: 25
    # The maximal average package complexity.
    # If it's higher than 0.0 (float) the check is enabled
    # Default: 0.0
    package-average: 3.0
    # Should ignore tests.
    # Default: false
    skip-tests: true

  funlen:
    # Checks the number of lines in a function.
    # If lower than 0, disable the check.
    # Default: 60
    lines: 100
    # Checks the number of statements in a function.
    # If lower than 0, disable the check.
    # Default: 40
    statements: 60
    # Ignore comments when counting lines.
    # Default false
    ignore-comments: true

linters:
  enable-all: true
  disable:
    # - cyclop
    - depguard
    # - dupl
    - dupword
    - err113
    # - exhaustive
    - exhaustruct
    - forcetypeassert
    # - funlen
    # # - gochecknoglobals
    # # - gochecknoinits
    # - gocognit
    - goconst
    # - gocritic
    # # - gocyclo
    - godot
    # - godox
    # # - gosec
    # # - interfacebloat  
    # # - intrange
    - ireturn
    # - maintidx
    - misspell
    - mnd
    # # - nakedret
    # # - nestif
    - nilerr
    - nlreturn
    # # - nonamedreturns  
    # # - perfsprint
    # # - prealloc
    # # - revive
    # # - tagliatelle
    - tenv
    # # - unconvert
    # # - unparam
    - varnamelen
    # # - wastedassign
    - wrapcheck
    - wsl

issues:
  exclude-use-default: true
  exclude-dirs-use-default: false
  exclude-rules:
    - linters:
        - stylecheck
      text: "ST1003|ST1005"
    # Allow complex tests and examples, better to be self contained
    - path: (cmd/)
      linters:
        - forbidigo
        - errchkjson
    - path: (examples/)
      linters:
        - forbidigo
        - errchkjson